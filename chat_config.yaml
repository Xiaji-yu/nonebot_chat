# ============================================================
#  nonebot_chat 配置文件
# ============================================================
#  修改后重启机器人即可生效。
#  完整配置文档见 README.md 的「配置详解」章节。
# ============================================================
#
#  提示：启动时若发现 YAML 解析错误，插件会记录日志并回退到默认值，
#  不会阻止机器人启动。建议定期检查启动日志确认配置已正确加载。
# ============================================================

# ------------------------------------------------------------------
#  全局开关（NoneBot 配置，通过环境变量设置）
# ------------------------------------------------------------------
#  only_superusers : 是否仅允许超级用户使用。
#                    在 .env 文件中设置: CHAT_ONLY_SUPERUSERS=true/false
#                    默认 true（仅超管可用）。设为 false 则所有人可用。
#  chat_enabled   : 是否启用聊天功能。
#                    在 .env 文件中设置: CHAT_CHAT_ENABLED=true/false
# ------------------------------------------------------------------


# ------------------------------------------------------------------
#  人格（Personality）
# ------------------------------------------------------------------
#  定义 AI 助手的身份和行为准则。system_prompt 是影响回复风格
#  最重要的配置项，建议根据实际使用场景仔细撰写。
#
#  name         : 人格名称，出现在主动回复和系统提示中。
#  system_prompt: 系统提示词，相当于给 AI 的"人设说明书"。
#                 支持多行文本，可用 |（保留换行）或 >（折叠为单行）。
#                 建议明确指定语气、称呼、回复长度偏好、是否使用 emoji 等。
#  wake_words   : 唤醒词列表。用户消息命中任意唤醒词时才触发 AI 回复。
#                 注意：子串匹配（"hi" 会匹配到 "this"），请选择辨识度高的词。
# ------------------------------------------------------------------
personality:
  name: "小助手"
  system_prompt: |
    你是一个友善、聪明的助手，名叫小助手。
    请用简洁、自然的语气回复，避免过于正式或机械的表达。
    适当使用 emoji，但不要过度。记住和用户的历史对话上下文。
  wake_words:
    - "小助手"
    - "bot"


# ------------------------------------------------------------------
#  LLM（大语言模型）
# ------------------------------------------------------------------
#  配置 OpenAI 兼容 API 端点。支持 OpenAI 官方 API、Ollama 本地模型、
#  LM Studio、vLLM 等任何实现 /v1/chat/completions 接口的服务。
#
#  base_url  : API 基础地址，末尾不要加 /chat/completions。
#              本地 Ollama 默认 http://localhost:11434/v1
#              OpenAI 官方 https://api.openai.com/v1
#  model     : 模型名称，需与服务端实际加载的模型一致。
#  api_key   : API 密钥。Ollama 等本地服务可留空。
#  max_tokens: 单次生成的最大 token 数。过大可能增加延迟和成本。
#              中文场景下约 1 token ≈ 1.5-2 字符，500 字符 ≈ 300-350 token。
#  timeout   : 单次 API 请求的超时时间（秒）。网络不稳定时可适当增大。
# ------------------------------------------------------------------
llm:
  base_url: "http://localhost:11434/v1"
  model: "llama2"
  api_key: ""
  max_tokens: 1000
  timeout: 30


# ------------------------------------------------------------------
#  温度（Temperature）
# ------------------------------------------------------------------
#  控制 LLM 输出的随机性和创造性。值越高回复越有创意但越不稳定。
#
#  default       : 普通回复的温度。0.7 是平衡创意和一致性的常用值。
#  proactive_min : 主动回复温度的下限。主动回复通常更短、更随意，
#                  建议设置低于 default，让主动发言更温和。
#  proactive_max : 主动回复温度的上限。
#                  注意：proactive_min 必须 <= proactive_max，否则启动报错。
# ------------------------------------------------------------------
temperature:
  default: 0.7
  proactive_min: 0.5
  proactive_max: 1.0


# ------------------------------------------------------------------
#  记忆系统（Memory）
# ------------------------------------------------------------------
#  每个会话（session）维护独立的对话历史。
#  会话标识规则：群聊用 groupId_userId，私聊用 userId。
#
#  max_history           : 单会话最多保留的消息条数（含核心记忆）。
#                           超过后触发蒸馏压缩。
#                           建议 30-100，取决于上下文窗口大小。
#  distillation_threshold: 消息数达到此阈值时触发蒸馏。
#                           必须小于 max_history，否则启动报错。
#                           推荐设为 max_history 的 75%-80%。
#  core_memory_max       : 蒸馏后保留的核心摘要条数。
#                           这些摘要以 system 角色注入上下文，帮助 AI
#                           记住长对话中的重要信息（偏好、决定、待办等）。
# ------------------------------------------------------------------
memory:
  max_history: 50
  distillation_threshold: 40
  core_memory_max: 10


# ------------------------------------------------------------------
#  主动回复（Proactive）
# ------------------------------------------------------------------
#  机器人在某些条件下主动发起对话，而非仅被动响应。
#  主动回复同样经过休眠检测、黑白名单、频控等 Pipeline 检查。
#
#  enabled       : 是否启用主动回复功能。
#  probability   : 每条消息的主动回复概率（0.0-1.0）。
#                  0.1 表示约 10% 的消息会触发主动回复。
#  cooldown      : 同一会话内两次主动回复的最小间隔（秒）。
#                  防止刷屏，建议 120-600。
#  check_interval: 主动回复检查间隔（秒），当前版本保留为配置接口，
#                  实际触发在消息处理流中完成。
# ------------------------------------------------------------------
proactive:
  enabled: true
  probability: 0.1
  cooldown: 300
  check_interval: 60


# ------------------------------------------------------------------
#  Pipeline（消息处理流水线）
# ------------------------------------------------------------------
#  每条入站消息按以下顺序经过各阶段处理：
#
#  休眠检测 → 去重 → 黑白名单 → 静默关键词 → 频控
#          → 管理命令 → 防抖合并 → 触发检测 → AI 派发
#          → 消息格式化 → 发送
#
#  任一阶段决定 drop 消息，后续阶段不再执行。
# ------------------------------------------------------------------
pipeline:

  # ── 休眠模式 ──────────────────────────────────────────────────
  #  让机器人在指定时间段内"睡觉"，减少不必要的回复。
  #
  #  enabled            : 是否启用休眠模式。
  #  mode               : "schedule" — 按固定时间段休眠
  #                       "manual"   — 通过 /sleep /wake 命令手动控制
  #  schedule.start     : 休眠开始时间（HH:MM，24小时制）。
  #  schedule.end       : 休眠结束时间（HH:MM）。
  #                       跨天设置示例：start="23:00", end="08:00"
  #  override_by_mention: 休眠期间 @mention 机器人是否允许唤醒。
  #                       设为 true 时，紧急 @ 仍能得到回复。
  sleep:
    enabled: false
    mode: "schedule"
    schedule:
      start: "23:00"
      end: "08:00"
    override_by_mention: true


  # ── 去重（Dedup） ─────────────────────────────────────────────
  #  基于内容哈希 + 时间窗口去重，防止重复消息触发多次回复。
  #
  #  enabled: 是否启用去重。
  #  window  : 时间窗口（秒），相同内容在此窗口内只处理一次。
  dedup:
    enabled: true
    window: 5


  # ── 黑白名单（Access Control） ───────────────────────────────
  #  控制哪些用户/群组可以使用聊天功能。
  #
  #  mode   : "none"       — 不过滤，所有人可用（默认）
  #            "whitelist"  — 仅名单内的用户/群组可用
  #            "blacklist"  — 名单内的用户/群组被拦截
  #  users  : 用户 ID 列表（字符串），支持 QQ 号等。
  #           示例: ["123456789", "987654321"]
  #  groups : 群 ID 列表（字符串）。
  #           示例: ["123456789"]
  #
  #  注意：非法 mode 值会触发启动报错（fail-closed 设计）。
  access:
    mode: "none"
    users: []
    groups: []


  # ── 静默关键词（Silent） ─────────────────────────────────────
  #  消息命中任意静默关键词时，跳过回复（静默处理）。
  #  适用于"不想被 bot 打扰"的场景。
  #
  #  enabled  : 是否启用静默关键词。
  #  keywords : 静默关键词列表，子串匹配（不区分大小写）。
  silent:
    enabled: true
    keywords:
      - "闭嘴"
      - "别回"
      - "silent"


  # ── 频控（Rate Limit） ───────────────────────────────────────
  #  限制同一会话在时间窗口内的触发次数，防止滥用。
  #
  #  enabled      : 是否启用频控。
  #  max_requests : 时间窗口内最大允许触发次数。
  #                 设为 3 表示 10 秒内最多触发 3 次。
  #  window       : 时间窗口长度（秒）。
  ratelimit:
    enabled: true
    max_requests: 3
    window: 10


  # ── 触发检测（Trigger） ──────────────────────────────────────
  #  决定消息是否需要进入 AI 处理流程。
  #
  #  mode     : "mention"   — 必须 @机器人 才触发
  #              "keyword"   — 消息命中关键词才触发（默认）
  #              "spectator" — 旁观模式，所有消息都视为触发
  #  keywords : 触发关键词列表（keyword 模式下生效），子串匹配。
  #              留空列表在 keyword 模式下会触发启动报错。
  trigger:
    mode: "keyword"
    keywords:
      - "小助手"
      - "bot"


  # ── 管理命令（Admin） ────────────────────────────────────────
  #  特殊命令直接由插件处理，不经过 LLM，响应更快。
  #
  #  内置命令：
  #    清空记忆 / clear  — 清空当前会话的对话历史
  #    状态   / status   — 查看当前会话状态（消息数、休眠状态等）
  #    休眠   / sleep    — 切换休眠模式（manual 模式）
  #    唤醒   / wake     — 强制唤醒（manual 模式）
  #
  #  enabled: 是否启用管理命令功能。
  admin:
    enabled: true


  # ── 防抖合并（Debounce） ─────────────────────────────────────
  #  在防抖窗口内收集多条用户消息，合并为一条后再发送给 LLM。
  #  适合用户快速连发的场景（如复制粘贴多条消息）。
  #
  #  enabled: 是否启用防抖。
  #  window  : 防抖窗口（秒）。最后一条消息发出后等待这么久再统一处理。
  #             设为 3 表示用户停止输入 3 秒后才发送合并后的内容。
  debounce:
    enabled: true
    window: 3


  # ── 消息格式化（Format） ─────────────────────────────────────
  #  控制 LLM 回复的最终发送格式。
  #
  #  max_length : 单条消息的最大字符数。超过此长度的回复会被自动分片。
  #                注意：LLM 的 max_tokens 和此值是两个独立限制。
  #                中文约 1.5-2 字符/token，确保 max_length <= max_tokens * 1.5。
  #  mode       : "plain"    — 纯文本发送（默认）
  #                "markdown" — 基础 Markdown 转 OneBot CQ 码
  #                目前支持 **粗体**、*斜体*、`行内代码`、```代码块```
  format:
    max_length: 500
    mode: "plain"
